name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        # Integration tests under tests/integration/ self-skip via
        # describe.skipIf(!haveClaudeMem) when claude-mem is not installed
        # (always the case in CI). Unit tests under tests/unit/ run unconditionally.
